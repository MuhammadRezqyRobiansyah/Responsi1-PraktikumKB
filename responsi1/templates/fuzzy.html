<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Fuzzy - Peringatan Dini Banjir</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">AI<span class="gradient-text-emerald">Portal</span></a>
        <a href="/" style="color:white; text-decoration:none;">⬅ Kembali</a>
    </nav>
    
    <div class="app-container animate-fade">
        <h2 class="text-center gradient-text-blue" style="font-size: 2rem; margin-bottom: 10px;">Sistem Keselamatan Banjir</h2>
        <p class="text-center desc-text" style="font-size:1rem; margin-bottom: 40px;">Mamdani Fuzzy Inference System (scikit-fuzzy)</p>
        
        <div class="slider-group">
            <label>Tinggi Air (cm) <span id="valTinggi">150</span></label>
            <input type="range" id="iTinggi" min="0" max="300" value="150" oninput="updateVal('valTinggi', this.value)">
        </div>
        
        <div class="slider-group">
            <label>Curah Hujan (mm/jam) <span id="valHujan">50</span></label>
            <input type="range" id="iHujan" min="0" max="100" value="50" oninput="updateVal('valHujan', this.value)">
        </div>
        
        <div class="slider-group">
            <label>Laju Naikan Air (cm/menit) <span id="valLaju">5</span></label>
            <input type="range" id="iLaju" min="0" max="10" value="5" oninput="updateVal('valLaju', this.value)">
        </div>
        
        <button class="btn btn-calculate" onclick="calculateFuzzy()">Hitung Status AI 🚀</button>
        
        <div class="result-card" id="result-box" style="display:none;">
            <p style="color:var(--text-muted); font-size:1.1rem; margin-bottom:10px;">Tingkat Indikasi Bahaya:</p>
            <div class="score-text" id="fuzzyScore">0.00%</div>
            <div class="status-badge" id="fuzzyStatus">Memuat...</div>
        </div>
    </div>

    <script>
        function updateVal(id, val) {
            document.getElementById(id).innerText = val;
        }

        async function calculateFuzzy() {
            const btn = document.querySelector('.btn-calculate');
            btn.innerText = "Memproses...";
            btn.disabled = true;

            const reqBox = {
                tinggi: document.getElementById('iTinggi').value,
                hujan: document.getElementById('iHujan').value,
                laju: document.getElementById('iLaju').value
            };

            try {
                const res = await fetch('/api/fuzzy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqBox)
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('result-box').style.display = 'block';
                    document.getElementById('fuzzyScore').innerText = data.score + "%";
                    
                    const badge = document.getElementById('fuzzyStatus');
                    badge.innerText = data.status;
                    badge.className = "status-badge level-" + data.level; // dynamically set color class
                } else {
                    alert("Error pada server Python: " + data.error);
                }
            } catch(e) {
                alert("Gagal koneksi ke server AI.");
            } finally {
                btn.innerText = "Hitung Status AI 🚀";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
