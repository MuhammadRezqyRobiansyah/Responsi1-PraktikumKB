<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pakar - Limbah B3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">AI<span class="gradient-text-emerald">Portal</span></a>
        <a href="/" style="color:white; text-decoration:none;">⬅ Kembali</a>
    </nav>
    
    <div class="app-container animate-fade">
        <h2 class="text-center gradient-text-emerald" style="font-size: 2rem; margin-bottom: 10px;">Diagnosa Limbah B3</h2>
        <p class="text-center desc-text" style="font-size:1rem; margin-bottom: 40px;">Forward Chaining Intelligent System</p>
        
        <div id="question-area" class="result-card" style="min-height: 200px; display:flex; flex-direction:column; justify-content:center;">
            <p id="question-text" style="font-size: 1.4rem; font-weight:600; line-height: 1.5;">Memuat mesin inferensi...</p>
        </div>
        
        <div id="action-area" style="display: flex; gap: 20px; justify-content: center; margin-top: 30px;">
            <button class="btn btn-yes" onclick="sendAnswer('ya')" style="flex:1;">Ya, Benar</button>
            <button class="btn btn-no" onclick="sendAnswer('tidak')" style="flex:1;">Tidak</button>
        </div>
        <div class="text-center">
            <button class="btn btn-reset" onclick="startApp()">🔄 Diagnosa Ulang</button>
        </div>
    </div>

    <script>
        let currentState = { possible_waste: [], asked_characteristics: [], current_char: null };

        async function startApp() {
            document.getElementById('action-area').style.display = 'flex';
            const res = await fetch('/api/pakar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'start' })
            });
            handleResponse(await res.json());
        }

        async function sendAnswer(reply) {
            const res = await fetch('/api/pakar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'answer',
                    reply: reply,
                    possible_waste: currentState.possible_waste,
                    asked_characteristics: currentState.asked_characteristics,
                    current_char: currentState.current_char
                })
            });
            handleResponse(await res.json());
        }

        function handleResponse(data) {
            const qt = document.getElementById('question-text');
            if (data.status === 'done') {
                qt.innerHTML = `<span style="font-size:1.1rem; color:#9CA3AF;">Hasil Deteksi B3:</span><br><br><span style="color:#10B981; font-size:2rem; font-weight:800;">${data.result}</span>`;
                document.getElementById('action-area').style.display = 'none';
            } else {
                qt.innerText = data.pertanyaan;
                currentState.possible_waste = data.possible_waste;
                currentState.asked_characteristics = data.asked_characteristics;
                currentState.current_char = data.kode;
            }
        }
        
        // Start engine
        startApp();
    </script>
</body>
</html>
